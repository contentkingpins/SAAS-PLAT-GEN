version: 1
frontend:
  phases:
    preBuild:
      commands:
        - echo "Current directory: $(pwd)"
        - ls -la
        - cd healthcare-lead-platform
        - npm install
    build:
      commands:
        - echo "Current directory: $(pwd)"
        - ls -la
        - cd healthcare-lead-platform
        - npm run build
  artifacts:
    baseDirectory: healthcare-lead-platform/.next
    files:
      - '**/*'
  cache:
    paths:
      - healthcare-lead-platform/node_modules/**/* 